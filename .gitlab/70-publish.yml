# Manual GitHub sneak-preview publish. Force-pushes a history-free,
# single-commit snapshot of `main` to the public GitHub mirror
# (Anselmoo/spectrafit-core) via `rrt git publish-snapshot`. Never runs
# automatically — `when: manual` — and only becomes triggerable after every
# earlier stage (setup/lint/test/coverage/build/pages) has succeeded, since
# this job keeps default stage-ordering (no `needs:` override).
#
# dependencies: [] is required despite having no `needs:` — without it,
# GitLab implicitly tries to download artifacts from every prior job
# (confirmed via a real missing_dependency_failure on first trigger,
# 2026-07-10): the never-triggered optional `build:ci-image` (.pre stage,
# `when: manual`) has no artifacts to fetch, which the scheduler treats as
# an unsatisfiable dependency. `dependencies: []` opts out of artifact
# fetching entirely (this job only needs the git checkout) while still
# preserving stage-ordering — unlike `needs: []`, which would also skip
# waiting for earlier stages, defeating the "only after tests pass" gate.
#
# Requires the `GITHUB_TOKEN` CI/CD variable (masked + protected + hidden): a
# GitHub fine-grained PAT scoped to Anselmoo/spectrafit-core,
# "Contents: Read and write" only.
#
# `git remote add gitlab ...` exists so rrt's primary_remote = "gitlab" safety
# guard (pyproject.toml [tool.rrt]) actually resolves here — a fresh CI
# checkout otherwise has no remote literally named `gitlab`, which would make
# the guard silently no-op instead of protecting anything.
#
# rrt is pinned to ==1.11.2 (not @latest) so a future release can't silently
# change this job's behavior.
#
# git config user.email/user.name is set explicitly because rrt's
# publish-snapshot creates a real commit (git commit -m "Initial commit")
# internally, and neither the base image (nikolaik/python-nodejs, a generic
# dev image) nor GitLab Runner itself provisions a git identity by default —
# no other job in this pipeline creates a commit, so this gap was never hit
# before. Caught by inspection before ever triggering the job with this
# config (a local isolated-clone test couldn't have caught it either, since
# a local machine's global ~/.gitconfig masks the same gap).
#
# Exclusion is done manually BEFORE invoking rrt, not via its --exclude flag —
# a second confirmed repo-release-tools 1.11.2 bug (2026-07-11), found only by
# actually running the job (dry-run mode never executes real git commands, so
# it can't catch this): rrt's internal `git rm -r --ignore-unmatch` (used to
# apply --exclude) omits `-f`/--force. On the `git checkout --orphan` branch
# publish-snapshot creates internally, there is no HEAD commit yet, so git's
# "does this match HEAD" safety check trivially fails for every file and
# `git rm` refuses ("the following files have changes staged in the index").
# Reproduced and verified the fix in an isolated scratch repo before landing
# this: `git rm -f` succeeds fine on a real branch WITH a HEAD (the safety
# check has something to compare against), so removing the excluded paths
# here — on the real `main` checkout, before rrt ever creates its orphan
# branch — sidesteps the bug entirely. (The earlier, first confirmed bug
# still applies too: [tool.rrt.publish_targets.<name>].exclude in
# pyproject.toml is parsed but silently dropped, which is why --exclude was
# ever passed explicitly in the first place — moot now that exclusion happens
# before rrt runs at all.)

publish:github:
  stage: publish
  when: manual
  dependencies: []
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - |
      echo "Smoke-testing GITHUB_TOKEN before any destructive action..."
      HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/Anselmoo/spectrafit-core)
      if [ "$HTTP_CODE" != "200" ]; then
        echo "GITHUB_TOKEN smoke test failed (HTTP $HTTP_CODE) — aborting before touching git remotes."
        exit 1
      fi
      echo "Smoke test OK (HTTP 200)."
    - git config user.email "ci@spectrafit-core.invalid"
    - git config user.name "spectrafit-core CI"
    - |
      python3 -c "
      import subprocess, fnmatch
      patterns = [
          'docs/superpowers/plans/*',
          'docs/superpowers/specs/*',
          'docs/superpowers/ledgers/*',
          '.claude/audit/*.jsonl',
      ]
      tracked = subprocess.run(['git', 'ls-files'], capture_output=True, text=True, check=True).stdout.splitlines()
      to_remove = [f for f in tracked if any(fnmatch.fnmatch(f, p) for p in patterns)]
      if to_remove:
          subprocess.run(['git', 'rm', '-r', '-f', '--ignore-unmatch', '--', *to_remove], check=True)
          print(f'Removed {len(to_remove)} excluded path(s) before snapshotting.')
      else:
          print('No excluded paths matched — nothing to remove.')
      "
    - git remote add gitlab "$CI_REPOSITORY_URL"
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/Anselmoo/spectrafit-core.git"
    - |
      uvx --from 'repo-release-tools==1.11.2' rrt git publish-snapshot github \
        --yes-i-know-this-overwrites-remote-history
